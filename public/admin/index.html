<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - FreshMart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/admin/admin.css">
</head>
<body>

    <!-- Sidebar Overlay (mobile) -->
    <div id="sidebar-overlay" onclick="closeSidebar()"></div>

    <!-- Sidebar -->
    <aside id="admin-sidebar">
        <div class="sidebar-logo">
            <i class="fas fa-leaf" style="color:#34d399;font-size:1.4rem"></i>
            <span>FreshMart <span class="badge">ADMIN</span></span>
        </div>
        <nav class="sidebar-nav">
            <a href="/admin/index.html" class="nav-item active" data-page="index"><i class="fas fa-chart-pie"></i><span>Dashboard</span></a>
            <a href="/admin/products.html" class="nav-item" data-page="products"><i class="fas fa-box"></i><span>Products</span></a>
            <a href="/admin/orders.html" class="nav-item" data-page="orders"><i class="fas fa-shopping-cart"></i><span>Orders</span></a>
            <a href="/admin/customers.html" class="nav-item" data-page="customers"><i class="fas fa-users"></i><span>Customers</span></a>
            <a href="/admin/coupons.html" class="nav-item" data-page="coupons"><i class="fas fa-ticket-alt"></i><span>Coupons</span></a>
            <a href="/admin/delivery.html" class="nav-item" data-page="delivery"><i class="fas fa-truck-fast"></i><span>Delivery</span></a>
            <a href="/admin/reports.html" class="nav-item" data-page="reports"><i class="fas fa-chart-bar"></i><span>Reports</span></a>
        </nav>
        <div class="sidebar-footer">
            <button onclick="logout()"><i class="fas fa-power-off"></i><span>Sign Out</span></button>
        </div>
    </aside>

    <!-- Main -->
    <div id="admin-main">
        <!-- Mobile Topbar -->
        <div class="admin-topbar">
            <button id="hamburger-btn" onclick="openSidebar()"><i class="fas fa-bars"></i></button>
            <div class="logo-text"><i class="fas fa-leaf" style="color:#059669"></i> FreshMart Admin</div>
            <div style="display:flex;align-items:center;gap:8px">
                <span id="admin-name-top" style="font-size:0.8rem;font-weight:700;color:#64748b"></span>
                <div style="width:32px;height:32px;border-radius:10px;background:#059669;display:flex;align-items:center;justify-content:center;color:#fff;font-size:0.8rem"><i class="fas fa-user-shield"></i></div>
            </div>
        </div>

        <div class="admin-content">
            <!-- Header -->
            <div class="page-header">
                <div>
                    <h1>Business Overview
                        <span id="live-indicator" style="display:inline-flex;align-items:center;gap:6px;font-size:10px;background:#fee2e2;color:#dc2626;padding:4px 10px;border-radius:999px;letter-spacing:0.08em;font-weight:700;vertical-align:middle;margin-left:10px">
                            <span style="width:6px;height:6px;background:#dc2626;border-radius:50%;animation:pulse 1.5s infinite"></span>Offline
                        </span>
                    </h1>
                    <p>Real-time stats from your supermarket operations.</p>
                </div>
                <div style="display:flex;align-items:center;gap:12px;background:#fff;border-radius:16px;padding:10px 16px;border:1px solid #f1f5f9;box-shadow:0 2px 8px rgba(0,0,0,0.04)">
                    <span id="admin-name" style="font-weight:700;color:#475569;font-size:0.9rem">Admin</span>
                    <div style="width:32px;height:32px;background:#059669;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff"><i class="fas fa-user-shield"></i></div>
                </div>
            </div>

            <!-- Stats -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon" style="background:#eff6ff;color:#2563eb"><i class="fas fa-chart-line"></i></div>
                    <div class="stat-label">Total Sales</div>
                    <div class="stat-value" id="stat-sales">--</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="background:#f0fdf4;color:#16a34a"><i class="fas fa-shopping-basket"></i></div>
                    <div class="stat-label">Total Orders</div>
                    <div class="stat-value" id="stat-orders">--</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="background:#fff7ed;color:#ea580c"><i class="fas fa-box-open"></i></div>
                    <div class="stat-label">Products</div>
                    <div class="stat-value" id="stat-products">--</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="background:#faf5ff;color:#7c3aed"><i class="fas fa-users"></i></div>
                    <div class="stat-label">Customers</div>
                    <div class="stat-value" id="stat-customers">--</div>
                </div>
            </div>

            <!-- Activity Grid -->
            <div class="panel-grid">
                <div class="panel">
                    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
                        <h3 class="panel-title" style="margin:0">Recent Orders</h3>
                        <a href="/admin/orders.html" style="color:#059669;font-weight:700;font-size:0.8rem;text-decoration:none">View All →</a>
                    </div>
                    <div id="recent-orders" class="card-list">
                        <div style="height:56px;background:#f8fafc;border-radius:14px;animation:pulse 1.5s infinite"></div>
                        <div style="height:56px;background:#f8fafc;border-radius:14px;animation:pulse 1.5s infinite"></div>
                    </div>
                </div>
                <div class="panel">
                    <h3 class="panel-title">Low Stock Alerts</h3>
                    <div id="stock-alerts" class="card-list">
                        <div style="height:56px;background:#f8fafc;border-radius:14px;animation:pulse 1.5s infinite"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <style>
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
    </style>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/utils/utils.js"></script>
    <script>
        let socket;
        document.addEventListener('DOMContentLoaded', () => {
            isAdmin();
            loadDashboardStats();
            initSocket();
        });

        function openSidebar() {
            document.getElementById('admin-sidebar').classList.add('open');
            document.getElementById('sidebar-overlay').classList.add('show');
        }
        function closeSidebar() {
            document.getElementById('admin-sidebar').classList.remove('open');
            document.getElementById('sidebar-overlay').classList.remove('show');
        }

        function initSocket() {
            socket = io();
            socket.emit('join_admin');
            socket.on('connect', () => {
                const el = document.getElementById('live-indicator');
                el.innerHTML = '<span style="width:6px;height:6px;background:#10b981;border-radius:50%"></span>Live';
                el.style.background = '#f0fdf4'; el.style.color = '#059669';
            });
            socket.on('disconnect', () => {
                const el = document.getElementById('live-indicator');
                el.innerHTML = '<span style="width:6px;height:6px;background:#dc2626;border-radius:50%;animation:pulse 1.5s infinite"></span>Offline';
                el.style.background = '#fee2e2'; el.style.color = '#dc2626';
            });
            socket.on('NEW_ORDER', () => { utils.showToast('New order received!'); loadDashboardStats(); });
            socket.on('ORDER_STATUS_UPDATE', () => loadDashboardStats());
        }

        function isAdmin() {
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            const token = localStorage.getItem('token');
            if (!token || user.role !== 'admin') { localStorage.clear(); window.location.href = '/auth.html'; return; }
            document.getElementById('admin-name').innerText = user.name || 'Admin';
            const top = document.getElementById('admin-name-top');
            if (top) top.innerText = user.name || 'Admin';
        }

        function getStatusBadge(status) {
            const map = { 'Placed':'badge-blue','Packed':'badge-yellow','Out for Delivery':'badge-purple','Delivered':'badge-green','Cancelled':'badge-red' };
            return `<span class="badge ${map[status]||'badge-gray'}">${status}</span>`;
        }

        async function loadDashboardStats() {
            try {
                const res = await api.get('/admin/dashboard');
                document.getElementById('stat-sales').innerText = utils.formatCurrency(res.data.totalSales);
                document.getElementById('stat-orders').innerText = res.data.totalOrders;
                document.getElementById('stat-products').innerText = res.data.totalProducts;
                document.getElementById('stat-customers').innerText = res.data.totalCustomers;

                const ordersRes = await api.get('/admin/orders?limit=5');
                document.getElementById('recent-orders').innerHTML = ordersRes.orders.slice(0, 5).map(o => `
                    <div class="data-card">
                        <div class="data-card-row">
                            <span style="font-weight:800;color:#1e293b">#FM-${o.id}</span>
                            <span style="font-weight:700;font-size:0.85rem;color:#059669">${utils.formatCurrency(o.final_amount)}</span>
                        </div>
                        <div class="data-card-row">
                            <span style="font-size:0.8rem;color:#64748b">${o.customer_name}</span>
                            ${getStatusBadge(o.status)}
                        </div>
                    </div>
                `).join('');

                const prodRes = await api.get('/products');
                const lowStock = prodRes.products.filter(p => p.stock < 10);
                const alertList = document.getElementById('stock-alerts');
                if (lowStock.length === 0) {
                    alertList.innerHTML = '<p style="color:#94a3b8;text-align:center;padding:20px 0;font-style:italic">All items sufficiently stocked.</p>';
                } else {
                    alertList.innerHTML = lowStock.map(p => `
                        <div class="data-card" style="border-left:3px solid #ef4444">
                            <div class="data-card-row">
                                <span style="font-weight:700;color:#1e293b">${p.name}</span>
                                <span style="font-weight:800;color:#ef4444;font-size:0.85rem">${p.stock} left</span>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (e) { console.error('Error loading dashboard stats', e); }
        }

        function logout() { localStorage.clear(); window.location.href = '/auth.html'; }
    </script>
</body>
</html>
