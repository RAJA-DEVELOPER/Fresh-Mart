<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coupons - FreshMart Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/admin/admin.css">
</head>
<body>
    <div id="sidebar-overlay" onclick="closeSidebar()"></div>

    <aside id="admin-sidebar">
        <div class="sidebar-logo">
            <i class="fas fa-leaf" style="color:#34d399;font-size:1.4rem"></i>
            <span>FreshMart <span class="badge">ADMIN</span></span>
        </div>
        <nav class="sidebar-nav">
            <a href="/admin/index.html" class="nav-item" data-page="index"><i class="fas fa-chart-pie"></i><span>Dashboard</span></a>
            <a href="/admin/products.html" class="nav-item" data-page="products"><i class="fas fa-box"></i><span>Products</span></a>
            <a href="/admin/orders.html" class="nav-item" data-page="orders"><i class="fas fa-shopping-cart"></i><span>Orders</span></a>
            <a href="/admin/customers.html" class="nav-item" data-page="customers"><i class="fas fa-users"></i><span>Customers</span></a>
            <a href="/admin/coupons.html" class="nav-item active" data-page="coupons"><i class="fas fa-ticket-alt"></i><span>Coupons</span></a>
            <a href="/admin/delivery.html" class="nav-item" data-page="delivery"><i class="fas fa-truck-fast"></i><span>Delivery</span></a>
            <a href="/admin/reports.html" class="nav-item" data-page="reports"><i class="fas fa-chart-bar"></i><span>Reports</span></a>
        </nav>
        <div class="sidebar-footer">
            <button onclick="logout()"><i class="fas fa-power-off"></i><span>Sign Out</span></button>
        </div>
    </aside>

    <div id="admin-main">
        <div class="admin-topbar">
            <button id="hamburger-btn" onclick="openSidebar()"><i class="fas fa-bars"></i></button>
            <div class="logo-text"><i class="fas fa-leaf" style="color:#059669"></i> FreshMart Admin</div>
            <button class="btn-primary" onclick="openModal()" style="padding:8px 14px;font-size:0.8rem"><i class="fas fa-plus"></i></button>
        </div>

        <div class="admin-content">
            <div class="page-header">
                <div>
                    <h1>Coupon Management</h1>
                    <p>Create and manage promotional discount codes.</p>
                </div>
                <button class="btn-primary desktop-only" onclick="openModal()"><i class="fas fa-plus"></i> New Coupon</button>
            </div>

            <div id="coupons-grid" class="coupons-grid">
                <!-- Skeleton loaders -->
                <div style="height:140px;background:#fff;border-radius:20px;border:1px solid #f1f5f9;animation:pulse 1.5s infinite"></div>
                <div style="height:140px;background:#fff;border-radius:20px;border:1px solid #f1f5f9;animation:pulse 1.5s infinite"></div>
                <div style="height:140px;background:#fff;border-radius:20px;border:1px solid #f1f5f9;animation:pulse 1.5s infinite"></div>
            </div>
        </div>
    </div>

    <!-- Create Coupon Modal -->
    <div id="coupon-modal" class="modal-overlay hidden">
        <div class="modal-box" style="max-width:460px">
            <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
            <h2 class="modal-title">New Coupon</h2>
            <form id="coupon-form" style="display:flex;flex-direction:column;gap:16px">
                <div class="form-group">
                    <label class="form-label">Coupon Code</label>
                    <input type="text" id="code" required class="form-input" placeholder="e.g. SAVE20" style="text-transform:uppercase">
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
                    <div class="form-group">
                        <label class="form-label">Discount Type</label>
                        <select id="type" class="form-input">
                            <option value="percentage">Percentage (%)</option>
                            <option value="fixed">Fixed (₹)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Value</label>
                        <input type="number" id="value" required class="form-input" placeholder="0">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Min Order Value (₹)</label>
                    <input type="number" id="min-order" class="form-input" placeholder="0 (no minimum)">
                </div>
                <div class="form-group">
                    <label class="form-label">Expiry Date</label>
                    <input type="date" id="expiry" required class="form-input">
                </div>
                <button type="submit" class="btn-primary" style="justify-content:center;padding:14px;margin-top:4px">
                    <i class="fas fa-tag"></i> Save Coupon
                </button>
            </form>
        </div>
    </div>

    <style>
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

        .coupon-card {
            background: #fff;
            border-radius: 20px;
            padding: 22px;
            border: 1px solid #f1f5f9;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
            position: relative;
            overflow: hidden;
        }
        .coupon-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, #059669, #34d399);
        }
        .coupon-card.expired::before { background: linear-gradient(90deg, #ef4444, #f87171); }

        .coupon-delete-btn {
            position: absolute;
            top: 14px; right: 14px;
            width: 32px; height: 32px;
            border: none;
            background: #f8fafc;
            border-radius: 8px;
            color: #cbd5e1;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        .coupon-delete-btn:hover { background: #fee2e2; color: #ef4444; }
    </style>

    <script src="/js/api.js"></script>
    <script src="/js/utils/utils.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            isAdmin();
            loadCoupons();
        });

        function openSidebar() { document.getElementById('admin-sidebar').classList.add('open'); document.getElementById('sidebar-overlay').classList.add('show'); }
        function closeSidebar() { document.getElementById('admin-sidebar').classList.remove('open'); document.getElementById('sidebar-overlay').classList.remove('show'); }

        function isAdmin() {
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            if (!localStorage.getItem('token') || user.role !== 'admin') { localStorage.clear(); window.location.href = '/auth.html'; }
        }

        async function loadCoupons() {
            try {
                const res = await api.get('/admin/coupons');
                const grid = document.getElementById('coupons-grid');
                if (!res.coupons || res.coupons.length === 0) {
                    grid.innerHTML = `
                        <div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:#94a3b8">
                            <i class="fas fa-ticket-alt" style="font-size:3rem;margin-bottom:16px;display:block;opacity:0.2"></i>
                            <p style="font-weight:600">No coupons yet. Create your first one!</p>
                        </div>`;
                    return;
                }

                const now = new Date();
                grid.innerHTML = res.coupons.map(c => {
                    const expired = new Date(c.valid_until) < now;
                    const discountLabel = c.discount_type === 'percentage'
                        ? `${c.discount_value}% OFF`
                        : `₹${c.discount_value} OFF`;
                    return `
                        <div class="coupon-card ${expired ? 'expired' : ''}">
                            <button class="coupon-delete-btn" onclick="confirmDelete(${c.id})" title="Delete coupon">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                            <div style="margin-bottom:12px">
                                <span class="badge ${expired ? 'badge-red' : 'badge-green'}" style="margin-bottom:8px">${expired ? 'EXPIRED' : c.discount_type.toUpperCase()}</span>
                            </div>
                            <div style="font-size:1.6rem;font-weight:800;color:#1e293b;letter-spacing:-0.5px;margin-bottom:4px">${c.code}</div>
                            <div style="font-size:1rem;font-weight:700;color:#059669;margin-bottom:12px">${discountLabel}</div>
                            ${c.min_order_value > 0 ? `<div style="font-size:11px;color:#94a3b8;margin-bottom:6px">Min order: ₹${c.min_order_value}</div>` : ''}
                            <div style="font-size:11px;font-weight:700;color:${expired ? '#ef4444' : '#94a3b8'};padding-top:12px;border-top:1px solid #f1f5f9">
                                ${expired ? '⚠ Expired' : 'Valid until'}: ${new Date(c.valid_until).toLocaleDateString('en-IN', {day:'numeric', month:'short', year:'numeric'})}
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (err) { utils.showToast('Failed to load coupons', 'error'); }
        }

        async function confirmDelete(id) {
            const confirmed = await utils.showConfirm('Delete Coupon', 'Are you sure you want to permanently delete this coupon?');
            if (!confirmed) return;
            try {
                const res = await api.delete('/admin/coupons/' + id);
                utils.showToast(res.message || 'Coupon deleted');
                loadCoupons();
            } catch (err) { utils.showToast(err.message || 'Delete failed', 'error'); }
        }

        function openModal() { document.getElementById('coupon-modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('coupon-modal').classList.add('hidden'); }

        document.getElementById('coupon-form').addEventListener('submit', async e => {
            e.preventDefault();
            const payload = {
                code: document.getElementById('code').value.trim().toUpperCase(),
                discount_type: document.getElementById('type').value,
                discount_value: parseFloat(document.getElementById('value').value),
                min_order_value: parseFloat(document.getElementById('min-order').value) || 0,
                valid_until: document.getElementById('expiry').value
            };
            try {
                const res = await api.post('/admin/coupons', payload);
                utils.showToast(res.message || 'Coupon created!');
                closeModal();
                document.getElementById('coupon-form').reset();
                loadCoupons();
            } catch (err) { utils.showToast(err.message, 'error'); }
        });

        function logout() { localStorage.clear(); window.location.href = '/auth.html'; }
    </script>
</body>
</html>
